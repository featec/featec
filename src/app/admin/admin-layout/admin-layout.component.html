<!-- src/app/admin/admin-layout/admin-layout.component.html -->
<div class="admin-wrapper">
  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" *ngIf="mobileSidebarOpen" (click)="mobileSidebarOpen = false"></div>

  <!-- Shared Sidebar -->
  <aside class="sidebar" [class.mobile-open]="mobileSidebarOpen">
    <div class="sidebar-brand">
      <div class="brand-logo">F</div>
      <div class="brand-info">
        <span class="brand-name">Featec</span>
        <span class="brand-tag">Admin Console</span>
      </div>
      <!-- Close btn for mobile -->
      <button class="mobile-close" (click)="mobileSidebarOpen = false">✕</button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Main Menu</div>
      <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="mobileSidebarOpen = false">
        <div class="nav-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
          </svg>
        </div>
        <span>Dashboard</span>
      </a>

      <div class="nav-label">Management</div>
      <a routerLink="/admin/blogs" routerLinkActive="active" (click)="mobileSidebarOpen = false">
        <div class="nav-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </div>
        <span>Blogs</span>
      </a>
      <a routerLink="/admin/categories" routerLinkActive="active" (click)="mobileSidebarOpen = false">
        <div class="nav-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <span>Categories</span>
      </a>
      <a routerLink="/admin/features" routerLinkActive="active" (click)="mobileSidebarOpen = false">
        <div class="nav-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
        </div>
        <span>Roadmap Features</span>
      </a>

      <div class="nav-label">System</div>
      <a routerLink="/admin/metadata" routerLinkActive="active" (click)="mobileSidebarOpen = false">
        <div class="nav-icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <circle cx="12" cy="14" r="3"></circle>
          </svg>
        </div>
        <span>Metadata</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">{{ authService.getUserDisplayName()?.charAt(0) || 'A' }}</div>
        <div class="user-info">
          <span class="user-name">{{ authService.getUserDisplayName() }}</span>
          <span class="user-status">Online</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Page Content via Router -->
  <main class="layout-main-content">
    <!-- Mobile hamburger toggle passed to child via service or direct styling -->
    <button class="mobile-toggle" (click)="mobileSidebarOpen = true">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <router-outlet></router-outlet>
  </main>
</div>
