<div class="modal-header">
    <h4 class="modal-title">{{applicationName}} Application Demo Request</h4>
    <button type="button" class="btn-close text-white" aria-label="Close" (click)="closeModal()"></button>
</div>
<form [formGroup]="demoForm" (ngSubmit)="onSubmit()">
    <div class="modal-body">
        <!-- Full Name -->
        <div class="row mb-4">
            <div class="col-12">
                <label for="firstName" class="form-label fw-bold">Full Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control form-control-lg" formControlName="fullName"
                    placeholder="Enter your full name" />
                <div *ngIf="submitted && f.fullName.errors" class="text-danger">
                    <div *ngIf="submitted && f.fullName.errors.required">
                        Name is required
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact Information -->
        <div class="row mb-4">
            <div class="col-md-6">
                <label for="phone" class="form-label fw-bold">Phone Number <span class="text-danger">*</span></label>
                <input type="text" class="form-control form-control-lg" formControlName="mobileNo"
                    placeholder="Enter phone number" />
                <div *ngIf="submitted && f.mobileNo.errors" class="text-danger">
                    <div *ngIf="submitted && f.mobileNo.errors.required">
                        Phone No is required
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <label for="email" class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control form-control-lg" formControlName="email"
                    placeholder="Enter email address" />
                <div *ngIf="submitted && f.email.errors" class="text-danger">
                    <div *ngIf="submitted && f.email.errors.required">
                        emailid is required
                    </div>
                    <div *ngIf="submitted && f.email.errors.email">
                        Email Address is not Valid
                    </div>
                </div>
            </div>
        </div>

        <!-- Purpose of Demo -->
        <div class="mb-4">
            <label for="purpose" class="form-label fw-bold">Purpose of the Demo</label>
            <input type="text" class="form-control form-control-lg" formControlName="purpose"
                placeholder="Describe the purpose of the demo" />
        </div>

        <!-- Preferred Date -->
        <div class="row mb-4">
            <div class="col-md-6">
                <label for="preferredDate" class="form-label fw-bold">Preferred Date</label>
                <input type="date" class="form-control form-control-lg" formControlName="preferredDate" />
            </div>
        </div>

        <!-- Demo Duration -->
        <div class="mb-4">
            <label class="form-label fw-bold">How long would you like your demo to be?</label>
            <div class="form-check">
                <input type="radio" class="form-check-input" formControlName="duration" value="1"
                    id="duration15" />
                <label class="form-check-label" for="duration15">15-Minute intro call</label>
            </div>
            <div class="form-check">
                <input type="radio" class="form-check-input" formControlName="duration" value="2"
                    id="duration30" />
                <label class="form-check-label" for="duration30">30-Minute Screen Share overview</label>
            </div>
            <div class="form-check">
                <input type="radio" class="form-check-input" formControlName="duration" value="3"
                    id="duration45" />
                <label class="form-check-label" for="duration45">45-Minute in-depth deeper dive</label>
            </div>
        </div>

        <!-- Preferred Time -->
        <div class="row mb-4">
            <div class="col-md-6">
                <label for="preferredTime" class="form-label fw-bold">Preferred Time</label>
                <input type="time" class="form-control form-control-lg" formControlName="preferredTime" />
            </div>
        </div>

        <!-- Specific Features -->
        <div class="mb-4">
            <label for="additionalInfo" class="form-label fw-bold">Focus areas during the demo</label>
            <textarea class="form-control form-control-lg" formControlName="additionalInfo" rows="3"
                placeholder="List specific features or areas to focus on"></textarea>
        </div>

        <!-- Questions -->
        <div class="mb-4">
            <label for="questions" class="form-label fw-bold">Questions or Concerns</label>
            <textarea class="form-control form-control-lg" formControlName="questions" rows="3"
                placeholder="Any questions or concerns you have"></textarea>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-lg" (click)="closeModal()">Close</button>
        <button class="btn btn-primary btn-lg" type="submit" [disabled]="loading">
            <span *ngIf="loading">
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                <span>Loading...</span>
            </span>
            <span *ngIf="!loading">
                <i class="fa fa-save me-1"></i>
                <span>Submit Request</span>
            </span>
        </button>
    </div>
</form>
